<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Treino" />
<title>Treino · Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #0a0a0a; color: #f5f5f5; font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; min-height: 100vh; overscroll-behavior-y: none; }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  input, button { font-family: inherit; color: inherit; }
  input { -webkit-appearance: none; appearance: none; }
  input:focus { outline: none; }
  button { cursor: pointer; border: none; background: none; touch-action: manipulation; }

  .app { max-width: 520px; margin: 0 auto; padding: 20px 20px 60px; }

  /* Typography */
  .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(245,245,245,0.4); }
  .title { font-size: 42px; font-weight: 900; letter-spacing: -0.04em; line-height: 1; }
  .h2 { font-size: 28px; font-weight: 900; letter-spacing: -0.03em; line-height: 1; }

  /* Header */
  .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 32px; padding-top: 8px; }
  .header-center { text-align: center; flex: 1; }
  .ghost-btn { width: 38px; height: 38px; border-radius: 12px; border: 1px solid rgba(245,245,245,0.1); background: rgba(245,245,245,0.02); color: #f5f5f5; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ghost-btn:active { background: rgba(245,245,245,0.08); }

  /* Stats */
  .stat-row { display: flex; align-items: stretch; gap: 20px; padding: 20px 4px; margin-bottom: 24px; border-top: 1px solid rgba(245,245,245,0.08); border-bottom: 1px solid rgba(245,245,245,0.08); }
  .stat { flex: 1; }
  .stat-divider { width: 1px; background: rgba(245,245,245,0.08); }
  .stat-num { font-size: 36px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; margin-bottom: 6px; font-variant-numeric: tabular-nums; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(245,245,245,0.5); line-height: 1.3; }

  /* Section labels */
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(245,245,245,0.4); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .section-label button { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(245,245,245,0.6); padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(245,245,245,0.1); font-weight: 600; }
  .section-label button:active { background: rgba(245,245,245,0.06); }

  /* Day cards */
  .day-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
  .day-card { text-align: left; padding: 18px 20px; border-radius: 14px; background: rgba(245,245,245,0.03); border: 1px solid rgba(245,245,245,0.06); border-left-width: 3px; color: #f5f5f5; display: block; width: 100%; transition: background 0.15s; }
  .day-card.suggested { background: rgba(245,245,245,0.06); border-color: rgba(245,245,245,0.12); }
  .day-card:active { background: rgba(245,245,245,0.08); }
  .day-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .day-card-name { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .day-card-meta { font-size: 12px; color: rgba(245,245,245,0.5); margin-top: 2px; }
  .day-card-last { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(245,245,245,0.4); }
  .badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 4px 8px; border-radius: 6px; color: #0a0a0a; }

  /* Session */
  .session-day { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  .session-progress { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(245,245,245,0.5); margin-top: 4px; }
  .session-date-wrap { position: relative; display: inline-block; margin-top: 6px; }
  .session-date-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(245,245,245,0.55); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(245,245,245,0.1); background: rgba(245,245,245,0.03); font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
  .session-date-label:active { background: rgba(245,245,245,0.08); }
  .session-date-input { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; border: none; background: transparent; }
  .finish-btn { display: flex; align-items: center; gap: 4px; padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 700; color: #0a0a0a; min-height: 38px; }
  .finish-btn:disabled { opacity: 0.35; }
  .progress-bar { height: 2px; background: rgba(245,245,245,0.06); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar-fill { height: 100%; transition: width 0.25s, background 0.15s; }

  .exercise-list { display: flex; flex-direction: column; gap: 16px; }
  .exercise-card { padding: 18px 18px 14px; border-radius: 14px; background: rgba(245,245,245,0.03); border: 1px solid rgba(245,245,245,0.06); }
  .exercise-header { margin-bottom: 12px; }
  .exercise-name { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 6px; }
  .last-ref-label { text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px; color: rgba(245,245,245,0.4); }
  .last-ref-sets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .last-ref-set { font-size: 12px; color: rgba(245,245,245,0.65); font-variant-numeric: tabular-nums; }
  .last-ref-rir { color: rgba(245,245,245,0.35); font-size: 11px; }

  .sets-table { border-top: 1px solid rgba(245,245,245,0.06); padding-top: 8px; }
  .sets-header { display: grid; grid-template-columns: 24px 1fr 1fr 1fr 38px 24px; gap: 6px; padding: 6px 0; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(245,245,245,0.35); }
  .set-row { display: grid; grid-template-columns: 24px 1fr 1fr 1fr 38px 24px; gap: 6px; padding: 8px 0; align-items: center; }
  .set-row.done { background: rgba(245,245,245,0.03); border-radius: 8px; padding-left: 4px; padding-right: 4px; }
  .set-idx { font-size: 13px; font-weight: 700; color: rgba(245,245,245,0.5); font-variant-numeric: tabular-nums; padding-left: 2px; }
  .set-input { background: rgba(245,245,245,0.04); border: 1px solid rgba(245,245,245,0.08); border-radius: 8px; padding: 10px 8px; color: #f5f5f5; font-size: 15px; width: 100%; font-variant-numeric: tabular-nums; font-weight: 500; min-height: 40px; text-align: center; }
  .set-input:focus { border-color: rgba(245,245,245,0.25); background: rgba(245,245,245,0.06); }
  .check-btn { width: 38px; height: 38px; border-radius: 8px; border: 1.5px solid rgba(245,245,245,0.2); background: transparent; color: #f5f5f5; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .check-btn.checked { color: #0a0a0a; }
  .remove-set-btn { width: 24px; height: 38px; border-radius: 4px; color: rgba(245,245,245,0.2); display: flex; align-items: center; justify-content: center; }
  .remove-set-btn:active { color: rgba(245,245,245,0.6); background: rgba(245,245,245,0.04); }
  .remove-set-spacer { width: 24px; height: 38px; }
  .set-actions { display: flex; gap: 8px; margin-top: 6px; }
  .add-set-btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 10px; font-size: 12px; font-weight: 600; color: rgba(245,245,245,0.6); border-radius: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
  .add-set-btn:active { background: rgba(245,245,245,0.05); }

  /* History */
  .empty { padding: 80px 20px; text-align: center; color: rgba(245,245,245,0.5); }
  .empty-icon { font-size: 40px; opacity: 0.2; margin-bottom: 12px; }
  .history-list { display: flex; flex-direction: column; gap: 12px; }
  .history-card { padding: 16px 18px; border-radius: 14px; background: rgba(245,245,245,0.03); border: 1px solid rgba(245,245,245,0.06); }
  .history-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .history-day { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
  .history-date { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(245,245,245,0.4); margin-top: 2px; }
  .history-stats { display: flex; gap: 6px; font-size: 12px; color: rgba(245,245,245,0.55); margin-bottom: 12px; font-variant-numeric: tabular-nums; }
  .dot { color: rgba(245,245,245,0.25); }
  .history-exercises { display: flex; flex-direction: column; gap: 8px; border-top: 1px solid rgba(245,245,245,0.06); padding-top: 10px; }
  .history-ex-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .history-ex-sets { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; color: rgba(245,245,245,0.6); font-variant-numeric: tabular-nums; }

  /* Edit split */
  .edit-day-card { padding: 16px 18px; border-radius: 14px; background: rgba(245,245,245,0.03); border: 1px solid rgba(245,245,245,0.06); border-left-width: 3px; margin-bottom: 16px; }
  .edit-day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .edit-day-name { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .edit-ex-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-top: 1px solid rgba(245,245,245,0.05); }
  .edit-ex-row:first-of-type { border-top: none; }
  .edit-ex-input { flex: 1; background: rgba(245,245,245,0.04); border: 1px solid rgba(245,245,245,0.08); border-radius: 8px; padding: 10px 12px; color: #f5f5f5; font-size: 15px; font-weight: 500; min-height: 40px; -webkit-user-select: text; user-select: text; }
  .edit-ex-input:focus { background: rgba(245,245,245,0.08); border-color: rgba(245,245,245,0.25); }
  .move-btn, .del-btn { width: 28px; height: 28px; border-radius: 6px; color: rgba(245,245,245,0.4); display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .move-btn:active, .del-btn:active { background: rgba(245,245,245,0.06); color: rgba(245,245,245,0.8); }
  .del-btn { color: rgba(233, 69, 96, 0.5); }
  .del-btn:active { color: rgba(233, 69, 96, 1); background: rgba(233, 69, 96, 0.1); }
  .add-ex-btn { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px dashed rgba(245,245,245,0.15); color: rgba(245,245,245,0.6); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  .add-ex-btn:active { background: rgba(245,245,245,0.04); }

  /* Settings */
  .settings-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-radius: 12px; background: rgba(245,245,245,0.03); border: 1px solid rgba(245,245,245,0.06); margin-bottom: 10px; width: 100%; text-align: left; color: #f5f5f5; }
  .settings-item:active { background: rgba(245,245,245,0.06); }
  .settings-item-label { font-size: 15px; font-weight: 600; }
  .settings-item-sub { font-size: 12px; color: rgba(245,245,245,0.5); margin-top: 2px; }
  .settings-item-arrow { color: rgba(245,245,245,0.3); font-size: 18px; }
  .danger { color: #e94560; }
  .danger .settings-item-label { color: #e94560; }

  /* Delete session button */
  .delete-sess-btn { padding: 6px; color: rgba(245,245,245,0.3); border-radius: 6px; }
  .delete-sess-btn:active { color: #e94560; background: rgba(233,69,96,0.08); }

  /* Icons */
  .icon { width: 18px; height: 18px; stroke-width: 1.5; flex-shrink: 0; }
  .icon-sm { width: 14px; height: 14px; stroke-width: 2; flex-shrink: 0; }
  .icon-lg { width: 22px; height: 22px; stroke-width: 1.5; flex-shrink: 0; }

  /* Toast */
  .toast { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: #f5f5f5; color: #0a0a0a; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; animation: toastIn 0.3s ease; }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* Sync indicator */
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .sync-dot.idle { background: rgba(245,245,245,0.2); }
  .sync-dot.syncing { background: #f4a261; animation: sync-pulse 1s ease-in-out infinite; }
  .sync-dot.synced { background: #2a9d8f; }
  .sync-dot.error { background: #e94560; }
  .sync-dot.offline { background: rgba(245,245,245,0.3); }
  @keyframes sync-pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  .sync-inline { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(245,245,245,0.45); font-weight: 600; }
  .loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0a0a0a; z-index: 100; }
  .loading-mark { font-size: 56px; font-weight: 900; letter-spacing: -0.04em; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div id="app" class="app"></div>
<div id="loading" class="loading"><div class="loading-mark">PPL</div></div>

<script>
// ============================================================
// DATA + STATE
// ============================================================
const STORAGE_KEY_SESSIONS = 'wt.sessions.v1';
const STORAGE_KEY_SPLIT = 'wt.split.v1';
const STORAGE_KEY_DRIVE = 'wt.drive.v1';

// ===== Google Drive =====
const GOOGLE_CLIENT_ID = '938630473365-qgdqlb2oq1th7c5s7acsda6uk6khmfen.apps.googleusercontent.com';
const GOOGLE_SCOPES = 'https://www.googleapis.com/auth/drive.file openid email';
const DRIVE_FILE_NAME = 'workout-tracker.json';

const DEFAULT_SPLIT = {
  order: ['push', 'pull', 'legs'],
  days: {
    push: {
      name: 'Push',
      accent: '#e94560',
      exercises: [
        { id: uid('ex'), name: 'Incline Dumbbell Press' },
        { id: uid('ex'), name: 'Chest Press' },
        { id: uid('ex'), name: 'Lateral Raise' },
        { id: uid('ex'), name: 'Cable Lateral Raise' },
        { id: uid('ex'), name: 'Triceps Pushdown' },
      ],
    },
    pull: {
      name: 'Pull',
      accent: '#f4a261',
      exercises: [
        { id: uid('ex'), name: 'Lat Pulldown' },
        { id: uid('ex'), name: 'Row' },
        { id: uid('ex'), name: 'Face Pull' },
        { id: uid('ex'), name: 'Dumbbell Bicep Curl' },
        { id: uid('ex'), name: 'Incline Dumbbell Curl' },
        { id: uid('ex'), name: 'Abdominal' },
      ],
    },
    legs: {
      name: 'Legs',
      accent: '#2a9d8f',
      exercises: [
        { id: uid('ex'), name: 'Leg Press' },
        { id: uid('ex'), name: 'Leg Extension' },
        { id: uid('ex'), name: 'Leg Curl' },
        { id: uid('ex'), name: 'Hip Abduction Machine' },
        { id: uid('ex'), name: 'Deadlift' },
      ],
    },
  },
};

const state = {
  view: 'home',              // home | session | history | edit | settings
  sessions: [],
  split: DEFAULT_SPLIT,
  currentSession: null,
  editingDayKey: null,       // when view = edit, which day
  drive: {
    connected: false,
    email: null,
    token: null,
    tokenExpiresAt: 0,
    fileId: null,
  },
  sync: {
    status: 'idle',          // idle | syncing | synced | error | offline
    lastSyncAt: null,
    lastError: null,
  },
};

function uid(prefix) { return prefix + '-' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4); }

// ============================================================
// STORAGE
// ============================================================
function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY_SESSIONS);
    if (s) state.sessions = JSON.parse(s);
  } catch (e) { console.error('load sessions', e); }
  try {
    const sp = localStorage.getItem(STORAGE_KEY_SPLIT);
    if (sp) state.split = JSON.parse(sp);
  } catch (e) { console.error('load split', e); }
  try {
    const dr = localStorage.getItem(STORAGE_KEY_DRIVE);
    if (dr) {
      const parsed = JSON.parse(dr);
      // Only restore persistent fields; token is volatile and may have expired
      state.drive.email = parsed.email || null;
      state.drive.fileId = parsed.fileId || null;
      state.drive.connected = !!parsed.email;
    }
  } catch (e) { console.error('load drive', e); }
}
function saveSessions() {
  try { localStorage.setItem(STORAGE_KEY_SESSIONS, JSON.stringify(state.sessions)); }
  catch (e) { toast('Erro ao salvar'); console.error(e); }
}
function saveSplit() {
  try { localStorage.setItem(STORAGE_KEY_SPLIT, JSON.stringify(state.split)); }
  catch (e) { toast('Erro ao salvar'); console.error(e); }
  syncPushDebounced();
}
function saveDriveState() {
  try {
    localStorage.setItem(STORAGE_KEY_DRIVE, JSON.stringify({
      email: state.drive.email,
      fileId: state.drive.fileId,
    }));
  } catch (e) { console.error('save drive', e); }
}

// ============================================================
// HELPERS
// ============================================================
function relativeDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return 'hoje';
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return 'ontem';
  const diffDays = Math.floor((now - d) / (1000 * 60 * 60 * 24));
  if (diffDays < 7) return diffDays + 'd atrás';
  return d.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
}
// Format an ISO date for an <input type="date"> value (local YYYY-MM-DD)
function isoToInputDate(iso) {
  const d = new Date(iso);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
// Friendly label for the session date picker
function sessionDateLabel(iso) {
  const d = new Date(iso);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return 'hoje';
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return 'ontem';
  const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1);
  if (d.toDateString() === tomorrow.toDateString()) return 'amanhã';
  return d.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
}
function lastSessionOfDay(dayKey) {
  return state.sessions.find(s => s.dayKey === dayKey);
}
function lastPerformance(dayKey, exerciseId) {
  for (const sess of state.sessions) {
    if (sess.dayKey !== dayKey) continue;
    const ex = sess.exercises.find(e => e.id === exerciseId);
    if (ex && ex.sets.length > 0) return { date: sess.date, sets: ex.sets };
  }
  return null;
}
function suggestedDayKey() {
  const order = state.split.order;
  const last = state.sessions[0];
  if (!last) return order[0];
  const idx = order.indexOf(last.dayKey);
  if (idx === -1) return order[0];
  return order[(idx + 1) % order.length];
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ============================================================
// ICONS (inline SVG)
// ============================================================

let toastTimeout;
function toast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  clearTimeout(toastTimeout);
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  toastTimeout = setTimeout(() => el.remove(), 2200);
}

// ============================================================
// GOOGLE DRIVE AUTH
// ============================================================
let tokenClient = null;

function initGoogleClient() {
  if (!window.google || !window.google.accounts) {
    // GIS library hasn't loaded yet
    return false;
  }
  if (tokenClient) return true;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_SCOPES,
    callback: '', // Set per-request
  });
  return true;
}

// Request a fresh access token. Returns a promise that resolves to the token string.
function requestAccessToken() {
  return new Promise((resolve, reject) => {
    if (!initGoogleClient()) {
      reject(new Error('Google library not loaded yet'));
      return;
    }
    let settled = false;
    // Safety timeout: if the OAuth flow never calls back, reject after 15s so
    // the UI doesn't get stuck in "syncing" forever.
    const timer = setTimeout(() => {
      if (settled) return;
      settled = true;
      reject(new Error('Auth timeout'));
    }, 15000);

    tokenClient.callback = (resp) => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      if (resp.error) {
        reject(new Error(resp.error));
        return;
      }
      state.drive.token = resp.access_token;
      state.drive.tokenExpiresAt = Date.now() + (resp.expires_in * 1000) - 60000;
      resolve(resp.access_token);
    };
    tokenClient.error_callback = (err) => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      reject(new Error(err.type || err.message || 'Auth error'));
    };
    try {
      // Standard flow: browser decides whether to show popup based on user's
      // current Google session. Works reliably in Safari iOS, unlike prompt='none'.
      tokenClient.requestAccessToken({ prompt: '' });
    } catch (err) {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      reject(err);
    }
  });
}

// Get a valid token, requesting a new one only if current is expired.
async function getValidToken() {
  if (state.drive.token && Date.now() < state.drive.tokenExpiresAt) {
    return state.drive.token;
  }
  return await requestAccessToken();
}

// Fetch the user's email via the userinfo endpoint (lightweight, no extra scope needed
// since 'drive.file' doesn't include email; we add openid+email implicitly below).
// Actually, drive.file alone doesn't give us email. We'll get it from the ID token
// by adding openid email profile to the scope request. Simpler approach: use the
// tokeninfo endpoint to get basic info, OR add email scope. We'll add email scope.
async function fetchUserEmail(token) {
  try {
    const resp = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (!resp.ok) return null;
    const data = await resp.json();
    return data.email || null;
  } catch (e) {
    console.error('fetchUserEmail', e);
    return null;
  }
}

async function connectDrive() {
  try {
    if (!window.google || !window.google.accounts) {
      toast('Biblioteca do Google ainda carregando, tente de novo');
      return;
    }
    const token = await requestAccessToken();
    const email = await fetchUserEmail(token);
    state.drive.connected = true;
    state.drive.email = email || 'conta Google';
    saveDriveState();
    toast('Conectado ao Drive');
    render();
    // Immediately sync: if Drive has a file, pull it; otherwise push local data up.
    syncPullSilent();
  } catch (err) {
    console.error('connectDrive', err);
    toast('Erro ao conectar: ' + (err.message || 'desconhecido'));
  }
}

function disconnectDrive() {
  if (!confirm('Desconectar do Google Drive?\n\nOs dados locais permanecem salvos no telefone.')) return;
  // Revoke the token if we have one
  if (state.drive.token) {
    try { google.accounts.oauth2.revoke(state.drive.token, () => {}); } catch (e) {}
  }
  state.drive.connected = false;
  state.drive.email = null;
  state.drive.token = null;
  state.drive.tokenExpiresAt = 0;
  state.drive.fileId = null;
  localStorage.removeItem(STORAGE_KEY_DRIVE);
  toast('Desconectado');
  render();
}

// ============================================================
// GOOGLE DRIVE FILE OPERATIONS
// ============================================================
const DRIVE_API = 'https://www.googleapis.com/drive/v3';
const DRIVE_UPLOAD_API = 'https://www.googleapis.com/upload/drive/v3';

// Find our workout-tracker.json file if it exists. Returns file id or null.
async function findDriveFile(token) {
  const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
  const resp = await fetch(`${DRIVE_API}/files?q=${q}&fields=files(id,name,modifiedTime)&spaces=drive`, {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (!resp.ok) throw new Error(`Drive search failed (${resp.status})`);
  const data = await resp.json();
  if (data.files && data.files.length > 0) {
    return data.files[0].id;
  }
  return null;
}

// Build the JSON payload of all local data
function buildDrivePayload() {
  return {
    version: 1,
    syncedAt: new Date().toISOString(),
    split: state.split,
    sessions: state.sessions,
  };
}

// Create a new file on Drive with the given content. Returns new file id.
async function createDriveFile(token, content) {
  const metadata = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
  const boundary = 'boundary_' + Math.random().toString(36).slice(2);
  const body =
    `--${boundary}\r\n` +
    `Content-Type: application/json; charset=UTF-8\r\n\r\n` +
    JSON.stringify(metadata) + `\r\n` +
    `--${boundary}\r\n` +
    `Content-Type: application/json\r\n\r\n` +
    JSON.stringify(content) + `\r\n` +
    `--${boundary}--`;
  const resp = await fetch(`${DRIVE_UPLOAD_API}/files?uploadType=multipart&fields=id`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      'Content-Type': `multipart/related; boundary=${boundary}`,
    },
    body,
  });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`Create failed (${resp.status}): ${text.slice(0, 200)}`);
  }
  const data = await resp.json();
  return data.id;
}

// Update an existing file on Drive with new content
async function updateDriveFile(token, fileId, content) {
  const resp = await fetch(`${DRIVE_UPLOAD_API}/files/${fileId}?uploadType=media`, {
    method: 'PATCH',
    headers: {
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(content),
  });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`Update failed (${resp.status}): ${text.slice(0, 200)}`);
  }
  return true;
}

// Read the file content from Drive
async function readDriveFile(token, fileId) {
  const resp = await fetch(`${DRIVE_API}/files/${fileId}?alt=media`, {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`Read failed (${resp.status}): ${text.slice(0, 200)}`);
  }
  return await resp.json();
}

// ===== High-level sync actions =====

async function uploadToDrive() {
  if (!state.drive.connected) {
    toast('Conecte o Drive primeiro');
    return;
  }
  toast('Enviando…');
  try {
    const token = await getValidToken();
    const payload = buildDrivePayload();
    // Always re-check for existing file (in case it was created from another device)
    let fileId = state.drive.fileId;
    if (!fileId) {
      fileId = await findDriveFile(token);
    }
    if (fileId) {
      await updateDriveFile(token, fileId, payload);
    } else {
      fileId = await createDriveFile(token, payload);
    }
    state.drive.fileId = fileId;
    saveDriveState();
    toast('Enviado pro Drive ✓');
    render();
  } catch (err) {
    console.error('uploadToDrive', err);
    toast('Erro ao enviar: ' + (err.message || 'desconhecido'));
  }
}

async function downloadFromDrive() {
  if (!state.drive.connected) {
    toast('Conecte o Drive primeiro');
    return;
  }
  toast('Baixando…');
  try {
    const token = await getValidToken();
    let fileId = state.drive.fileId;
    if (!fileId) {
      fileId = await findDriveFile(token);
    }
    if (!fileId) {
      toast('Nenhum arquivo no Drive ainda');
      return;
    }
    const data = await readDriveFile(token, fileId);
    if (!data.sessions || !data.split) {
      throw new Error('Arquivo do Drive inválido');
    }
    const confirmMsg = `Baixar ${data.sessions.length} sessões do Drive?\n\nIsso vai substituir os dados atuais no telefone.`;
    if (!confirm(confirmMsg)) {
      toast('Cancelado');
      return;
    }
    state.sessions = data.sessions;
    state.split = data.split;
    state.drive.fileId = fileId;
    saveSessions();
    saveSplit();
    saveDriveState();
    toast('Baixado do Drive ✓');
    render();
  } catch (err) {
    console.error('downloadFromDrive', err);
    toast('Erro ao baixar: ' + (err.message || 'desconhecido'));
  }
}

// ===== Auto-sync =====

function updateSyncStatus(status, error = null) {
  state.sync.status = status;
  if (status === 'synced') state.sync.lastSyncAt = new Date().toISOString();
  if (error) state.sync.lastError = error;
  // Only re-render if on a view that shows the indicator (home, settings)
  if (state.view === 'home' || state.view === 'settings') render();
}

// Silent pull on app open: if Drive file exists, replace local data with it.
async function syncPullSilent() {
  if (!state.drive.connected) return;
  try {
    updateSyncStatus('syncing');
    const token = await getValidToken();
    let fileId = state.drive.fileId || await findDriveFile(token);
    if (!fileId) {
      // No file on Drive yet — push local data up as initial sync
      updateSyncStatus('idle');
      syncPushDebounced();
      return;
    }
    const data = await readDriveFile(token, fileId);
    if (!data.sessions || !data.split) {
      updateSyncStatus('error', 'Arquivo do Drive inválido');
      return;
    }
    // Last-write-wins: Drive is always authoritative on app open
    state.sessions = data.sessions;
    state.split = data.split;
    state.drive.fileId = fileId;
    saveSessions();
    saveSplit();
    saveDriveState();
    updateSyncStatus('synced');
  } catch (err) {
    console.error('syncPullSilent', err);
    updateSyncStatus('idle');
  }
}

// Push local state up to Drive (debounced to coalesce rapid edits)
let pushDebounceTimer = null;
function syncPushDebounced() {
  if (!state.drive.connected) return;
  if (pushDebounceTimer) clearTimeout(pushDebounceTimer);
  updateSyncStatus('syncing');
  pushDebounceTimer = setTimeout(async () => {
    try {
      const token = await getValidToken();
      const payload = buildDrivePayload();
      let fileId = state.drive.fileId;
      if (!fileId) {
        fileId = await findDriveFile(token);
      }
      if (fileId) {
        await updateDriveFile(token, fileId, payload);
      } else {
        fileId = await createDriveFile(token, payload);
      }
      state.drive.fileId = fileId;
      saveDriveState();
      updateSyncStatus('synced');
    } catch (err) {
      console.error('syncPushDebounced', err);
      updateSyncStatus('error', err.message || 'Erro ao enviar');
    }
  }, 2000);
}

// Listen for online/offline events
window.addEventListener('offline', () => updateSyncStatus('offline'));
window.addEventListener('online', () => {
  if (state.drive.connected) {
    updateSyncStatus('idle');
    // Attempt to push any pending changes
    syncPushDebounced();
  }
});

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  if (state.view === 'home') renderHome(app);
  else if (state.view === 'session') renderSession(app);
  else if (state.view === 'history') renderHistory(app);
  else if (state.view === 'edit') renderEdit(app);
  else if (state.view === 'settings') renderSettings(app);
  window.scrollTo(0, 0);
}

// Manually triggered full sync. Shows popup if needed.
async function forceSyncNow() {
  if (!state.drive.connected) return;
  updateSyncStatus('syncing');
  try {
    const token = await getValidToken();
    let fileId = state.drive.fileId || await findDriveFile(token);
    if (fileId) {
      const data = await readDriveFile(token, fileId);
      if (data && data.sessions && data.split) {
        state.sessions = data.sessions;
        state.split = data.split;
        saveSessions();
        saveSplit();
      }
      state.drive.fileId = fileId;
      saveDriveState();
    }
    updateSyncStatus('synced');
  } catch (err) {
    console.error('forceSyncNow', err);
    updateSyncStatus('error', err.message || 'Erro');
  }
}

          <input type="date" id="session-date-input" class="session-date-input" value="${isoToInputDate(sess.date)}" />
        </div>
      </div>
      <button class="finish-btn" style="background:${accent}" data-action="finish" ${doneSets === 0 ? 'disabled' : ''}>
        ${icons.check} Fim
      </button>
    </div>
    <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%;background:${accent}"></div></div>
    <div class="exercise-list">${exerciseCards}</div>
  `;

  // Input listeners — save on input
  root.querySelectorAll('.set-input').forEach(inp => {
    inp.addEventListener('input', e => {
      const exIdx = +inp.dataset.ex, setIdx = +inp.dataset.set, field = inp.dataset.field;
      state.currentSession.exercises[exIdx].sets[setIdx][field] = inp.value;
    });
  });

  root.querySelector('[data-action="cancel"]').addEventListener('click', cancelSession);
  root.querySelector('[data-action="finish"]').addEventListener('click', finishSession);

  // Date picker: update session date, preserve time-of-day so history ordering stays stable
  const dateInput = root.querySelector('#session-date-input');
  if (dateInput) {
    dateInput.addEventListener('change', e => {
      const val = e.target.value; // "YYYY-MM-DD"
      if (!val) return;
      const [y, m, d] = val.split('-').map(Number);
      const existing = new Date(state.currentSession.date);
      existing.setFullYear(y, m - 1, d);
      state.currentSession.date = existing.toISOString();
      render();
    });
  }
  root.querySelectorAll('[data-action="toggle"]').forEach(btn => btn.addEventListener('click', () => {
    const exIdx = +btn.dataset.ex, setIdx = +btn.dataset.set;
    state.currentSession.exercises[exIdx].sets[setIdx].done = !state.currentSession.exercises[exIdx].sets[setIdx].done;
    render();
  }));
  root.querySelectorAll('[data-action="add-set"]').forEach(btn => btn.addEventListener('click', () => {
    const exIdx = +btn.dataset.ex;
    state.currentSession.exercises[exIdx].sets.push({ weight: '', reps: '', rir: '', done: false });
    render();
  }));
  root.querySelectorAll('[data-action="remove-set"]').forEach(btn => btn.addEventListener('click', () => {
    const exIdx = +btn.dataset.ex, setIdx = +btn.dataset.set;
    state.currentSession.exercises[exIdx].sets.splice(setIdx, 1);
    render();
  }));
}

function cancelSession() {
  if (!confirm('Descartar essa sessão? Nada será salvo.')) return;
  state.currentSession = null;
  state.view = 'home';
  render();
}
function finishSession() {
  const cleaned = {
    ...state.currentSession,
    exercises: state.currentSession.exercises.map(ex => ({
      ...ex,
      sets: ex.sets.filter(s => s.weight !== '' || s.reps !== '' || s.done),
    })).filter(ex => ex.sets.length > 0),
  };
  if (cleaned.exercises.length === 0) {
    toast('Nenhuma série completada');
    return;
  }
  state.sessions.push(cleaned);
  // Keep sessions sorted newest-first, so backdated sessions land in the right slot
  state.sessions.sort((a, b) => new Date(b.date) - new Date(a.date));
  saveSessions();
  syncPushDebounced();
  state.currentSession = null;
  state.view = 'home';
  toast('Sessão salva');
  render();
}

// ============================================================
// HISTORY VIEW
// ============================================================
function renderHistory(root) {
  const body = state.sessions.length === 0
    ? `<div class="empty"><div class="empty-icon">◌</div><div>Nenhuma sessão ainda</div></div>`
    : `<div class="history-list">${state.sessions.map(sess => {
        const accent = state.split.days[sess.dayKey]?.accent || '#888';
        const totalSets = sess.exercises.reduce((s, e) => s + e.sets.length, 0);
        const totalVol = sess.exercises.reduce((s, e) => s + e.sets.reduce((ss, set) => ss + (Number(set.weight)||0) * (Number(set.reps)||0), 0), 0);
        const exList = sess.exercises.filter(e => e.sets.length > 0).map(ex => `
          <div>
            <div class="history-ex-name">${escapeHtml(ex.name)}</div>
            <div class="history-ex-sets">
              ${ex.sets.map(s => `<span>${escapeHtml(s.weight || '–')}×${escapeHtml(s.reps || '–')}${s.rir !== '' && s.rir != null ? `<span class="last-ref-rir"> @${escapeHtml(s.rir)}</span>` : ''}</span>`).join('')}
            </div>
          </div>
        `).join('');
        return `
          <div class="history-card">
            <div class="history-header">
              <div style="flex:1">
                <div class="history-day" style="color:${accent}">${escapeHtml(sess.dayName)}</div>
                <div class="history-date">${new Date(sess.date).toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'short' })}</div>
              </div>
              <button class="delete-sess-btn" data-action="delete-sess" data-id="${sess.id}" aria-label="Apagar">${icons.trash}</button>
            </div>
            <div class="history-stats">
              <span>${sess.exercises.length} ex</span>
              <span class="dot">·</span>
              <span>${totalSets} séries</span>
              <span class="dot">·</span>
              <span>${totalVol.toLocaleString('pt-BR')} kg volume</span>
            </div>
            <div class="history-exercises">${exList}</div>
          </div>
        `;
      }).join('')}</div>`;

  root.innerHTML = `
    <div class="header">
      <button class="ghost-btn" data-action="back" aria-label="Voltar">${icons.back}</button>
      <div class="header-center"><h1 class="h2">Histórico</h1></div>
      <div style="width:38px"></div>
    </div>
    ${body}
  `;
  root.querySelector('[data-action="back"]').addEventListener('click', () => { state.view = 'home'; render(); });
  root.querySelectorAll('[data-action="delete-sess"]').forEach(btn => btn.addEventListener('click', () => {
    if (!confirm('Apagar essa sessão?')) return;
    state.sessions = state.sessions.filter(s => s.id !== btn.dataset.id);
    saveSessions();
    syncPushDebounced();
    render();
  }));
}

// ============================================================
// SETTINGS VIEW
// ============================================================
function renderSettings(root) {
  const driveSection = state.drive.connected ? `
    <button class="settings-item" data-action="disconnect-drive">
      <div>
        <div class="settings-item-label" style="color:#2a9d8f">● Google Drive conectado</div>
        <div class="settings-item-sub">${escapeHtml(state.drive.email || '')}</div>
      </div>
      <span class="settings-item-arrow">${icons.arrow}</span>
    </button>
    <button class="settings-item" data-action="upload-drive">
      <div>
        <div class="settings-item-label">↑ Enviar pro Drive</div>
        <div class="settings-item-sub">Salva dados atuais no Drive</div>
      </div>
      <span class="settings-item-arrow">${icons.arrow}</span>
    </button>
    <button class="settings-item" data-action="download-drive">
      <div>
        <div class="settings-item-label">↓ Baixar do Drive</div>
        <div class="settings-item-sub">Substitui dados locais pelos do Drive</div>
      </div>
      <span class="settings-item-arrow">${icons.arrow}</span>
    </button>
  ` : `
    <button class="settings-item" data-action="connect-drive">
      <div>
        <div class="settings-item-label">Conectar Google Drive</div>
        <div class="settings-item-sub">Sincronizar treinos entre dispositivos</div>
      </div>
      <span class="settings-item-arrow">${icons.arrow}</span>
    </button>
  `;

  root.innerHTML = `
    <div class="header">
      <button class="ghost-btn" data-action="back" aria-label="Voltar">${icons.back}</button>
      <div class="header-center"><h1 class="h2">Ajustes</h1></div>
      <div style="width:38px"></div>
    </div>

    <div class="section-label"><span>Sincronização</span></div>
    ${driveSection}

    <div class="section-label" style="margin-top:20px"><span>Treino</span></div>
    <button class="settings-item" data-action="edit">
      <div>
        <div class="settings-item-label">Editar exercícios</div>
        <div class="settings-item-sub">Adicionar, renomear, reordenar</div>
      </div>
      <span class="settings-item-arrow">${icons.arrow}</span>
    </button>

    <div class="section-label" style="margin-top:20px"><span>Dados</span></div>
    <button class="settings-item" data-action="export">
      <div>
        <div class="settings-item-label">Exportar JSON</div>
        <div class="settings-item-sub">Baixar backup dos treinos</div>
      </div>
      <span class="settings-item-arrow">${icons.arrow}</span>
    </button>
    <button class="settings-item" data-action="import">
      <div>
        <div class="settings-item-label">Importar JSON</div>
        <div class="settings-item-sub">Restaurar de um backup</div>
      </div>
      <span class="settings-item-arrow">${icons.arrow}</span>
    </button>
    <button class="settings-item danger" data-action="reset">
      <div>
        <div class="settings-item-label">Apagar todos os dados</div>
        <div class="settings-item-sub">Cuidado: não tem volta</div>
      </div>
      <span class="settings-item-arrow">${icons.arrow}</span>
    </button>

    <input type="file" id="import-file" accept="application/json" style="display:none">

    <div style="margin-top:40px;text-align:center;font-size:11px;color:rgba(245,245,245,0.3);letter-spacing:0.05em">
      Workout Tracker · dados salvos localmente no navegador
    </div>
  `;
  root.querySelector('[data-action="back"]').addEventListener('click', () => { state.view = 'home'; render(); });
  root.querySelector('[data-action="edit"]').addEventListener('click', () => { state.view = 'edit'; render(); });
  root.querySelector('[data-action="export"]').addEventListener('click', exportJSON);
  root.querySelector('[data-action="import"]').addEventListener('click', () => root.querySelector('#import-file').click());
  root.querySelector('#import-file').addEventListener('change', importJSON);
  root.querySelector('[data-action="reset"]').addEventListener('click', resetAll);
  const connectBtn = root.querySelector('[data-action="connect-drive"]');
  if (connectBtn) connectBtn.addEventListener('click', connectDrive);
  const disconnectBtn = root.querySelector('[data-action="disconnect-drive"]');
  if (disconnectBtn) disconnectBtn.addEventListener('click', disconnectDrive);
  const uploadBtn = root.querySelector('[data-action="upload-drive"]');
  if (uploadBtn) uploadBtn.addEventListener('click', uploadToDrive);
  const downloadBtn = root.querySelector('[data-action="download-drive"]');
  if (downloadBtn) downloadBtn.addEventListener('click', downloadFromDrive);
}

function exportJSON() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    split: state.split,
    sessions: state.sessions,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `workout-tracker-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  toast('Arquivo exportado');
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.sessions || !data.split) throw new Error('Formato inválido');
      if (!confirm(`Importar ${data.sessions.length} sessões? Isso vai substituir os dados atuais.`)) return;
      state.sessions = data.sessions;
      state.split = data.split;
      saveSessions();
      saveSplit();
      toast('Dados importados');
      render();
    } catch (err) {
      alert('Erro ao importar: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function resetAll() {
  if (!confirm('Apagar TUDO? Todos os treinos e a lista de exercícios serão perdidos.')) return;
  if (!confirm('Tem certeza mesmo? Essa ação não pode ser desfeita.')) return;
  localStorage.removeItem(STORAGE_KEY_SESSIONS);
  localStorage.removeItem(STORAGE_KEY_SPLIT);
  state.sessions = [];
  state.split = JSON.parse(JSON.stringify(DEFAULT_SPLIT));
  // Regenerate IDs so they're fresh
  for (const dk of state.split.order) {
    state.split.days[dk].exercises = state.split.days[dk].exercises.map(ex => ({ ...ex, id: uid('ex') }));
  }
  saveSplit();
  toast('Tudo apagado');
  state.view = 'home';
  render();
}

// ============================================================
// EDIT SPLIT VIEW
// ============================================================
function renderEdit(root) {
  const dayBlocks = state.split.order.map(key => {
    const day = state.split.days[key];
    const exRows = day.exercises.map((ex, idx) => `
      <div class="edit-ex-row">
        <button class="move-btn" data-action="move-up" data-day="${key}" data-idx="${idx}" ${idx === 0 ? 'disabled style="opacity:0.2"' : ''}>${icons.up}</button>
        <button class="move-btn" data-action="move-down" data-day="${key}" data-idx="${idx}" ${idx === day.exercises.length - 1 ? 'disabled style="opacity:0.2"' : ''}>${icons.down}</button>
        <input class="edit-ex-input" data-day="${key}" data-id="${ex.id}" value="${escapeHtml(ex.name)}" />
        <button class="del-btn" data-action="del-ex" data-day="${key}" data-id="${ex.id}">${icons.trash}</button>
      </div>
    `).join('');
    return `
      <div class="edit-day-card" style="border-left-color:${day.accent}">
        <div class="edit-day-header">
          <div class="edit-day-name" style="color:${day.accent}">${escapeHtml(day.name)}</div>
          <div style="font-size:11px;color:rgba(245,245,245,0.4);text-transform:uppercase;letter-spacing:0.1em">${day.exercises.length} ex</div>
        </div>
        ${exRows}
        <button class="add-ex-btn" data-action="add-ex" data-day="${key}">+ Adicionar exercício</button>
      </div>
    `;
  }).join('');

  root.innerHTML = `
    <div class="header">
      <button class="ghost-btn" data-action="back" aria-label="Voltar">${icons.back}</button>
      <div class="header-center"><h1 class="h2">Exercícios</h1></div>
      <div style="width:38px"></div>
    </div>
    <div style="font-size:12px;color:rgba(245,245,245,0.45);margin-bottom:20px;line-height:1.5">
      Edite nomes diretamente no campo. Renomear um exercício <strong style="color:rgba(245,245,245,0.7)">mantém o histórico</strong>.
      Remover apaga o exercício do dia, mas o histórico das sessões já registradas continua lá.
    </div>
    ${dayBlocks}
  `;

  root.querySelector('[data-action="back"]').addEventListener('click', () => { state.view = 'settings'; render(); });

  root.querySelectorAll('.edit-ex-input').forEach(inp => {
    inp.addEventListener('input', () => {
      const day = state.split.days[inp.dataset.day];
      const ex = day.exercises.find(e => e.id === inp.dataset.id);
      if (ex) ex.name = inp.value;
    });
    inp.addEventListener('blur', () => {
      const day = state.split.days[inp.dataset.day];
      const ex = day.exercises.find(e => e.id === inp.dataset.id);
      if (ex && ex.name.trim() === '') { ex.name = 'Exercício'; render(); }
      saveSplit();
    });
  });

  root.querySelectorAll('[data-action="move-up"]').forEach(btn => btn.addEventListener('click', () => {
    const day = state.split.days[btn.dataset.day];
    const idx = +btn.dataset.idx;
    if (idx === 0) return;
    [day.exercises[idx - 1], day.exercises[idx]] = [day.exercises[idx], day.exercises[idx - 1]];
    saveSplit();
    render();
  }));
  root.querySelectorAll('[data-action="move-down"]').forEach(btn => btn.addEventListener('click', () => {
    const day = state.split.days[btn.dataset.day];
    const idx = +btn.dataset.idx;
    if (idx >= day.exercises.length - 1) return;
    [day.exercises[idx + 1], day.exercises[idx]] = [day.exercises[idx], day.exercises[idx + 1]];
    saveSplit();
    render();
  }));
  root.querySelectorAll('[data-action="del-ex"]').forEach(btn => btn.addEventListener('click', () => {
    const day = state.split.days[btn.dataset.day];
    const ex = day.exercises.find(e => e.id === btn.dataset.id);
    if (!ex) return;
    if (!confirm(`Remover "${ex.name}" do dia ${day.name}?\n\n(O histórico antigo continua preservado.)`)) return;
    day.exercises = day.exercises.filter(e => e.id !== btn.dataset.id);
    saveSplit();
    render();
  }));
  root.querySelectorAll('[data-action="add-ex"]').forEach(btn => btn.addEventListener('click', () => {
    const day = state.split.days[btn.dataset.day];
    const newId = uid('ex');
    day.exercises.push({ id: newId, name: 'Novo exercício' });
    saveSplit();
    render();
    // After re-render, focus the newly added input and select its placeholder text
    setTimeout(() => {
      const newInput = document.querySelector(`.edit-ex-input[data-id="${newId}"]`);
      if (newInput) {
        newInput.focus();
        newInput.select();
      }
    }, 50);
  }));
}

// ============================================================
// BOOT
// ============================================================
loadData();
// Hide loading, render app
setTimeout(() => {
  document.getElementById('loading').style.display = 'none';
  render();
  // If Drive is connected, attempt a silent pull to get latest data.
  // Wait briefly for the GIS library to be available.
  if (state.drive.connected) {
    const tryPull = (attempts = 0) => {
      if (window.google && window.google.accounts) {
        syncPullSilent();
      } else if (attempts < 20) {
        setTimeout(() => tryPull(attempts + 1), 250);
      } else {
        updateSyncStatus('error', 'Google library não carregou');
      }
    };
    tryPull();
  }
}, 300);
</script>
